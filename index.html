<!DOCTYPE html>
<html lang="pl" data-lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ankieta ZUW</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="lang-switcher">
  <button onclick="setLang('pl')" data-lang-btn="pl" class="active">🇵🇱 PL</button>
  <button onclick="setLang('ua')" data-lang-btn="ua">🇺🇦 UA</button>
  <button onclick="setLang('ru')" data-lang-btn="ru">🇷🇺 RU</button>
  <button onclick="setLang('en')" data-lang-btn="en">🇬🇧 EN</button>
</div>

<div class="container">
  <div class="header">
    <h1 data-i18n="header_title"></h1>
    <p data-i18n="header_sub"></p>
  </div>

  <form class="form-body" id="mainForm">

    <!-- SECTION A -->
    <div class="section">
      <div class="section-title" data-i18n="sec_a"></div>

      <div class="row2">
        <div class="field">
          <label class="flabel" data-i18n="f_nazwisko"></label>
          <input type="text" name="nazwisko">
        </div>
        <div class="field">
          <label class="flabel" data-i18n="f_nazwisko_poprz"></label>
          <input type="text" name="nazwisko_poprzednie">
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label class="flabel" data-i18n="f_nazwisko_rod"></label>
          <input type="text" name="nazwisko_rodowe">
        </div>
        <div class="field">
          <label class="flabel" data-i18n="f_imie"></label>
          <input type="text" name="imie">
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label class="flabel" data-i18n="f_imie_poprz"></label>
          <input type="text" name="imie_poprzednie">
        </div>
        <div class="field">
          <label class="flabel" data-i18n="f_imie_ojca"></label>
          <input type="text" name="imie_ojca">
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label class="flabel" data-i18n="f_imie_matki"></label>
          <input type="text" name="imie_matki">
        </div>
        <div class="field">
          <label class="flabel" data-i18n="f_nazwisko_matki"></label>
          <input type="text" name="nazwisko_matki">
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label class="flabel" data-i18n="f_data_ur"></label>
          <input type="date" name="data_urodzenia">
        </div>
        <div class="field">
          <label class="flabel" data-i18n="f_plec"></label>
          <div class="radio-group">
            <label><input type="radio" name="plec" value="M"> <span data-i18n="opt_male"></span></label>
            <label><input type="radio" name="plec" value="K"> <span data-i18n="opt_female"></span></label>
          </div>
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label class="flabel" data-i18n="f_miejsce_ur"></label>
          <input type="text" name="miejsce_urodzenia">
        </div>
        <div class="field">
          <label class="flabel" data-i18n="f_panstwo_ur"></label>
          <input type="text" name="panstwo_urodzenia">
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label class="flabel" data-i18n="f_narodowosc"></label>
          <input type="text" name="narodowosc">
        </div>
        <div class="field">
          <label class="flabel" data-i18n="f_obywatelstwo"></label>
          <input type="text" name="obywatelstwo">
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label class="flabel" data-i18n="f_stan_cyw"></label>
          <select name="stan_cywilny">
            <option value="" data-i18n="opt_choose"></option>
            <option value="single" data-i18n="opt_single"></option>
            <option value="married" data-i18n="opt_married"></option>
            <option value="divorced" data-i18n="opt_divorced"></option>
            <option value="widowed" data-i18n="opt_widowed"></option>
          </select>
        </div>
        <div class="field">
          <label class="flabel" data-i18n="f_wyksztalcenie"></label>
          <select name="wyksztalcenie">
            <option value="" data-i18n="opt_choose"></option>
            <option value="primary" data-i18n="opt_edu_primary"></option>
            <option value="secondary" data-i18n="opt_edu_secondary"></option>
            <option value="higher" data-i18n="opt_edu_higher"></option>
            <option value="vocational" data-i18n="opt_edu_vocational"></option>
          </select>
        </div>
      </div>

      <label class="flabel" data-i18n="f_rysopis"></label>
      <div class="row3" style="margin-top:8px">
        <div class="field">
          <label class="flabel-sm" data-i18n="f_wzrost"></label>
          <input type="number" name="wzrost" placeholder="cm">
        </div>
        <div class="field">
          <label class="flabel-sm" data-i18n="f_oczy"></label>
          <input type="text" name="kolor_oczu">
        </div>
        <div class="field">
          <label class="flabel-sm" data-i18n="f_znaki"></label>
          <input type="text" name="znaki_szczegolne">
        </div>
      </div>

      <div class="row3">
        <div class="field">
          <label class="flabel" data-i18n="f_pesel"></label>
          <input type="text" name="pesel" maxlength="11">
        </div>
        <div class="field">
          <label class="flabel" data-i18n="f_telefon"></label>
          <input type="text" name="telefon">
        </div>
        <div class="field">
          <label class="flabel" data-i18n="f_email"></label>
          <input type="email" name="email">
        </div>
      </div>
    </div>

    <!-- SECTION B -->
    <div class="section">
      <div class="section-title" data-i18n="sec_b"></div>
      <div class="note" data-i18n="note_b"></div>

      <div class="row2">
        <div class="field">
          <label class="flabel" data-i18n="f_woj"></label>
          <select name="wojewodztwo">
            <option value="" data-i18n="opt_choose"></option>
            <option>dolnośląskie</option><option>kujawsko-pomorskie</option>
            <option>lubelskie</option><option>lubuskie</option>
            <option>łódzkie</option><option>małopolskie</option>
            <option>mazowieckie</option><option>opolskie</option>
            <option>podkarpackie</option><option>podlaskie</option>
            <option>pomorskie</option><option>śląskie</option>
            <option>świętokrzyskie</option><option>warmińsko-mazurskie</option>
            <option>wielkopolskie</option><option>zachodniopomorskie</option>
          </select>
        </div>
        <div class="field">
          <label class="flabel" data-i18n="f_miejscowosc"></label>
          <input type="text" name="miejscowosc">
        </div>
      </div>

      <div class="row3">
        <div class="field">
          <label class="flabel" data-i18n="f_ulica"></label>
          <input type="text" name="ulica">
        </div>
        <div class="field">
          <label class="flabel" data-i18n="f_nr_domu"></label>
          <input type="text" name="nr_domu">
        </div>
        <div class="field">
          <label class="flabel" data-i18n="f_nr_mieszk"></label>
          <input type="text" name="nr_mieszkania">
        </div>
      </div>

      <div class="field" style="max-width:200px">
        <label class="flabel" data-i18n="f_kod"></label>
        <input type="text" name="kod_pocztowy" placeholder="00-000">
      </div>
    </div>

    <!-- SECTION C -->
    <div class="section">
      <div class="section-title" data-i18n="sec_c"></div>

      <!-- I. Cel pobytu -->
      <div class="field">
        <label class="flabel" data-i18n="f_cel_title"></label>
        <div class="checkbox-list" style="margin-top:8px">
          <label><input type="radio" name="cel_pobytu" value="1"> <span data-i18n="cel_1"></span></label>
          <label><input type="radio" name="cel_pobytu" value="2"> <span data-i18n="cel_2"></span></label>
          <label><input type="radio" name="cel_pobytu" value="3"> <span data-i18n="cel_3"></span></label>
          <label><input type="radio" name="cel_pobytu" value="4"> <span data-i18n="cel_4"></span></label>
          <label><input type="radio" name="cel_pobytu" value="5"> <span data-i18n="cel_5"></span></label>
          <label><input type="radio" name="cel_pobytu" value="6"> <span data-i18n="cel_6"></span></label>
          <label><input type="radio" name="cel_pobytu" value="7"> <span data-i18n="cel_7"></span></label>
          <label><input type="radio" name="cel_pobytu" value="8"> <span data-i18n="cel_8"></span></label>
          <label><input type="radio" name="cel_pobytu" value="9"> <span data-i18n="cel_9"></span></label>
          <label><input type="radio" name="cel_pobytu" value="10"> <span data-i18n="cel_10"></span></label>
          <label><input type="radio" name="cel_pobytu" value="11"> <span data-i18n="cel_11"></span></label>
          <label><input type="radio" name="cel_pobytu" value="12"> <span data-i18n="cel_12"></span></label>
          <label><input type="radio" name="cel_pobytu" value="13"> <span data-i18n="cel_13"></span></label>
          <label><input type="radio" name="cel_pobytu" value="14"> <span data-i18n="cel_14"></span></label>
          <label><input type="radio" name="cel_pobytu" value="15"> <span data-i18n="cel_15"></span></label>
          <label><input type="radio" name="cel_pobytu" value="16"> <span data-i18n="cel_16"></span></label>
        </div>
        <div class="field" style="margin-top:10px">
          <label class="flabel-sm" data-i18n="f_cel_inne"></label>
          <input type="text" name="cel_inne">
        </div>
      </div>

      <hr class="divider">

      <!-- II. Rodzina -->
      <div class="field">
        <label class="flabel" data-i18n="f_rodzina_title"></label>
        <div id="familyBody" style="margin-top:10px">
          <div class="family-card">
            <div class="family-card-header">
              <span class="card-num"></span>
              <button type="button" class="del-row-btn" onclick="deleteCard(this)" data-i18n="btn_delete"></button>
            </div>
            <div class="family-card-body">
              <div class="field-full">
                <label class="flabel" data-i18n="fam_imie"></label>
                <input type="text" name="fam_imie[]">
              </div>
              <div>
                <label class="flabel" data-i18n="fam_data"></label>
                <input type="date" name="fam_data[]">
              </div>
              <div>
                <label class="flabel" data-i18n="fam_stopien"></label>
                <input type="text" name="fam_stopien[]">
              </div>
              <div>
                <label class="flabel" data-i18n="fam_obyw"></label>
                <input type="text" name="fam_obyw[]">
              </div>
              <div>
                <label class="flabel" data-i18n="fam_miejsce"></label>
                <input type="text" name="fam_miejsce[]">
              </div>
              <div>
                <label class="flabel" data-i18n="fam_pobyt"></label>
                <select name="fam_pobyt[]">
                  <option value="" data-i18n="opt_choose"></option>
                  <option value="yes" data-i18n="opt_yes"></option>
                  <option value="no" data-i18n="opt_no"></option>
                </select>
              </div>
              <div>
                <label class="flabel" data-i18n="fam_utrzym"></label>
                <select name="fam_utrzym[]">
                  <option value="" data-i18n="opt_choose"></option>
                  <option value="yes" data-i18n="opt_yes"></option>
                  <option value="no" data-i18n="opt_no"></option>
                </select>
              </div>
            </div>
          </div>
        </div>
        <button type="button" class="add-row-btn" onclick="addFamilyCard()" data-i18n="btn_add_family"></button>
      </div>

      <hr class="divider">

      <!-- III -->
      <div class="field">
        <label class="flabel" data-i18n="f_pobyt_title"></label>
        <div class="field" style="margin-top:10px">
          <label class="flabel-sm" data-i18n="f_poprz_pobyty"></label>
          <textarea name="poprzednie_pobyty"></textarea>
        </div>
        <div class="field">
          <label class="flabel-sm" data-i18n="f_aktualny_pobyt"></label>
          <div class="radio-group">
            <label><input type="radio" name="aktualny_pobyt" value="tak"> <span data-i18n="opt_yes"></span></label>
            <label><input type="radio" name="aktualny_pobyt" value="nie"> <span data-i18n="opt_no"></span></label>
          </div>
        </div>
        <div class="field">
          <label class="flabel-sm" data-i18n="f_data_wjazdu"></label>
          <input type="date" name="data_wjazdu" style="max-width:220px">
        </div>
        <div class="field">
          <label class="flabel-sm" data-i18n="f_podstawa_title"></label>
          <div class="checkbox-list" style="margin-top:6px">
            <label><input type="radio" name="podstawa_pobytu" value="bezwizowy"> <span data-i18n="podst_1"></span></label>
            <label><input type="radio" name="podstawa_pobytu" value="wiza"> <span data-i18n="podst_2"></span></label>
            <label><input type="radio" name="podstawa_pobytu" value="zezwolenie"> <span data-i18n="podst_3"></span></label>
            <label><input type="radio" name="podstawa_pobytu" value="schengen"> <span data-i18n="podst_4"></span></label>
          </div>
        </div>
      </div>

      <hr class="divider">

      <div class="field">
        <label class="flabel" data-i18n="f_podroze"></label>
        <textarea name="podroze"></textarea>
      </div>
      <hr class="divider">
      <div class="field">
        <label class="flabel" data-i18n="f_finanse"></label>
        <textarea name="srodki_finansowe"></textarea>
      </div>
      <hr class="divider">
      <div class="field">
        <label class="flabel" data-i18n="f_ubezp"></label>
        <textarea name="ubezpieczenie"></textarea>
      </div>
      <hr class="divider">
      <div class="field">
        <label class="flabel" data-i18n="f_zatrzym"></label>
        <div class="radio-group" style="margin-top:8px">
          <label><input type="radio" name="zatrzymanie" value="tak"> <span data-i18n="opt_yes"></span></label>
          <label><input type="radio" name="zatrzymanie" value="nie"> <span data-i18n="opt_no"></span></label>
        </div>
      </div>
      <hr class="divider">
      <div class="field">
        <label class="flabel" data-i18n="f_karalnosc"></label>
        <div class="radio-group" style="margin-top:8px; margin-bottom:10px">
          <label><input type="radio" name="karalnosc" value="tak"> <span data-i18n="opt_yes"></span></label>
          <label><input type="radio" name="karalnosc" value="nie"> <span data-i18n="opt_no"></span></label>
        </div>
        <textarea name="karalnosc_opis"></textarea>
      </div>
      <hr class="divider">
      <div class="field">
        <label class="flabel" data-i18n="f_postep"></label>
        <div class="radio-group" style="margin-top:8px; margin-bottom:10px">
          <label><input type="radio" name="postepowanie" value="tak"> <span data-i18n="opt_yes"></span></label>
          <label><input type="radio" name="postepowanie" value="nie"> <span data-i18n="opt_no"></span></label>
        </div>
        <textarea name="postepowanie_opis"></textarea>
      </div>
      <hr class="divider">
      <div class="field">
        <label class="flabel" data-i18n="f_zobowiaz"></label>
        <div class="radio-group" style="margin-top:8px; margin-bottom:10px">
          <label><input type="radio" name="zobowiazania" value="tak"> <span data-i18n="opt_yes"></span></label>
          <label><input type="radio" name="zobowiazania" value="nie"> <span data-i18n="opt_no"></span></label>
        </div>
        <textarea name="zobowiazania_opis"></textarea>
      </div>
    </div>

    <button type="button" class="submit-btn" onclick="submitForm()" data-i18n="btn_submit"></button>
  </form>

  <div id="successMsg" style="display:none; background:#d4edda; color:#155724; padding:20px; border-radius:10px; text-align:center; margin-top:20px; font-size:1.05rem;" data-i18n="msg_success"></div>
</div>

<script src="script.js"></script>
</body>
</html>
